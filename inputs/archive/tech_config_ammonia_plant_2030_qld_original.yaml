    source_note: Battery energy storage (0.1% per day standing losses)
    overnight_cost_per_mwh: 217000
    lifetime_years: 20
    interest_rate: 0.0872
    fixed_om_fraction: 0.029
    standing_loss_fraction_per_day: 0.001
  compressed_hydrogen_store:
    component_type: store
    source_note: compressedHydrogenStorage (Queensland report 2030)
    overnight_cost_per_mwh: 24000
    lifetime_years: 20
    interest_rate: 0.0872
    fixed_om_fraction: 0.02
