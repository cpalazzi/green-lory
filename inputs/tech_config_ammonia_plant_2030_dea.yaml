    build_cost_per_mw: 74130  # TODO: get DEA value (installation, BOP, civil, grid connection)
    land_use_km2_per_mw: 0.01  # 100 MW/km² density (Salmon et al.)
    lifetime_years: 40
    interest_rate: 0.1
    fixed_om_fraction: 0.02
