# QLD 2030 profile reshaped to DEA-style schema for compatibility with split-cost reporting.
# Costs/currency/lifetimes/interest/fixed O&M come from QLD inputs where available.
# tech_cost/build_cost splits are inferred from DEA per-technology split ratios and
# scaled to the QLD overnight cost.
# TODO(data): Replace inferred split ratios with real Queensland EPC/BOP/build-cost
# evidence where available. Priority candidates are ammonia_synthesis, battery_storage,
# hydrogen_from_storage, and battery_pcs_discharge.

currency: USD
water_usage_m3_per_t_nh3: 1.5
water_cost_baseline_usd_per_m3: 2

# ── Feasibility backstop ───────────────────────────────────────────────────────
# When a grid cell cannot meet ammonia demand from local renewables alone the LP
# would otherwise be infeasible.  This section enables a high-cost grid backstop
# that makes every cell solvable: results with grid_energy_mwh > 0 are flagged
# as resource-constrained and should be filtered out of cost comparisons.
#
# Comment out the entire grid_backstop block to disable the backstop — infeasible
# cells will then raise a RuntimeError and be skipped (or abort the run if
# fail_fast=True is set).  The --no-ensure-feasibility CLI flag has the same effect
# at runtime without editing this file.
grid_backstop:
  p_nom_mw: 20000                   # MW — ~1.6x worst-case peak demand; sufficient for any location
  marginal_cost_eur_per_mwh: 100000 # Prohibitive vs renewables/storage (~200x round-trip cost);
                                    #   cells dispatching the grid will show elevated LCOA and grid_energy_mwh > 0

